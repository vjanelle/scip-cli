name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 1'

jobs:
  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Bootstrap tools
        run: make bootstrap

      - name: Run security scan
        run: make security
